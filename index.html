<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leigh Annand</title>

  <style>
    body {
      margin: 0;
      padding: 1.2vw 0 0 1.2vw;
      background: #ffffff;
      font-family: "Times New Roman", Times, serif;
      color: #111;
    }

    /* BIO */
    .bio {
      font-size: clamp(18px, 2.2vw, 32px);
      line-height: 1.2;
      letter-spacing: -0.2px;
      max-width: 95vw;
    }

    .bio a {
      color: #111;
      text-decoration: underline;
      text-decoration-thickness: 1px;
    }

    .bio a:hover {
      opacity: 0.6;
    }

    /* INDEX (bottom-left) */
    .bottom {
      position: fixed;
      bottom: 1.2vw;
      left: 1.2vw;
      font-size: clamp(14px, 1.2vw, 20px);
    }

    .bottom a {
      text-decoration: none;
      color: #111;
    }

    /* Prevent overly wide text on huge screens */
    @media (min-width: 1600px) {
      .bio {
        max-width: 1400px;
      }
    }

    /* -------- MOBILE VERSION -------- */
    @media (max-width: 768px) {

      body {
        padding: 10px 0 0 10px;
      }

      .bio {
        font-size: 18px;
        line-height: 1.5;
        letter-spacing: 0;
        max-width: 95%;
      }

      .bottom {
        font-size: 16px;
        bottom: 10px;
        left: 10px;
      }
    }

    /* Extra small phones */
    @media (max-width: 420px) {
      .bio {
        font-size: 16px;
      }
    }

  </style>
</head>

<body>

  <!-- BIO -->
  <div class="bio">
    Leigh Annand (b.1999 Portland, OR) work includes 
    <a href="design.html">art direction + design</a>, 
    <a href="casting.html">casting</a>, and 
    <a href="projects.html">more</a>. 
    To get in touch, or inquire further about work please send an email to 
    <a href="mailto:annand.leigh@gmail.com">annand.leigh@gmail.com</a>. 
    PDF portfolio and CV available upon request.
  </div>

  <!-- INDEX -->
  <div class="bottom">
    <a href="work.html">Index</a>
  </div>

</body>
</html>
