<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Portfolio</title>

  <style>
    body {
      margin: 0;
      padding: 10px 0 0 10px; /* minimal top + left spacing */
      background: #ffffff;
      font-family: "Times New Roman", Times, serif;
      color: #111;
    }

    /* Bio text */
    .bio {
      font-size: 26px;
      line-height: 1.45;
      letter-spacing: -0.2px;
      max-width: 1200px;
    }

    .bio a {
      color: #111;
      text-decoration: underline;
      text-decoration-thickness: 1px;
    }

    .bio a:hover {
      opacity: 0.6;
    }

    /* Bottom index */
    .bottom {
      position: fixed;
      bottom: 10px;
      left: 10px;
      font-size: 20px;
    }

    .bottom a {
      text-decoration: none;
      color: #111;
    }

    /* ---------------- MOBILE ---------------- */
    @media (max-width: 768px) {
      body {
        padding: 8px 0 0 8px;
      }

      .bio {
        font-size: 18px;
        line-height: 1.5;
        letter-spacing: 0;
        max-width: 95%;
      }

      .bottom {
        font-size: 16px;
        bottom: 8px;
        left: 8px;
      }
    }

    @media (max-width: 420px) {
      .bio {
        font-size: 16px;
      }
    }
  </style>
</head>
