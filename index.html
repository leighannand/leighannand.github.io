<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leigh Annand</title>

<style>

body{
  margin:0;
  background:white;
  font-family:"Times New Roman", Times, serif;
}

.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* Name */
.name{
  font-size:20px;
  margin-bottom:22px;
}

/* Main links */
.nav{
  display:flex;
  flex-direction:column;
  gap:4px;
  margin-bottom:60px;
}

.nav a{
  text-decoration:none;
  color:black;
  font-size:20px;
}

/* Footer */
.footer{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.footer a{
  text-decoration:none;
  color:black;
  font-size:16px;
}

a:hover{
  text-decoration:underline;
}

/* Mobile tweaks */
@media (max-width:600px){

  .name{
    font-size:22px;
    margin-bottom:18px;
  }

  .nav a{
    font-size:24px;
  }

  .footer a{
    font-size:18px;
  }

}

</style>
</head>

<body>

<div class="container">

  <div class="name">
    Leigh Annand
  </div>

  <div class="nav">
    <a href="#">Design</a>
    <a href="#">Casting</a>
    <a href="#">HA HA HA</a>
  </div>

  <div class="footer">
    <a href="#">Contact</a>
    <a href="#">Index</a>
  </div>

</div>

</body>
</html>
