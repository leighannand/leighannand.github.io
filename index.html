<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #e9e9e9;
      font-family: "Times New Roman", Times, serif;
      color: #111;
    }

    /* Panel */
    .panel {
      background: #f5f5f5;
      border-radius: 14px;
      padding: 32px;
      min-height: 92vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Bio text */
    .bio {
      font-size: 26px;
      line-height: 1.45;
      letter-spacing: -0.2px;
      max-width: 920px;
    }

    .bio a {
      color: #111;
      text-decoration: underline;
      text-decoration-thickness: 1px;
    }

    .bio a:hover {
      opacity: 0.6;
    }

    /* Bottom link */
    .bottom {
      font-size: 20px;
    }

    .bottom a {
      text-decoration: none;
      color: #111;
    }

    /* ---------------- MOBILE ---------------- */
    @media (max-width: 768px) {

      body {
        padding: 12px;
      }

      .panel {
        padding: 20px;
        border-radius: 10px;
        min-height: 88vh;
      }

      .bio {
        font-size: 18px;
        line-height: 1.5;
        letter-spacing: 0;
      }

      .bottom {
        font-size: 16px;
      }

      /* Optional: give bottom link breathing room */
      .bottom {
        margin-top: 40px;
      }
    }

    /* Extra small phones */
    @media (max-width: 420px) {
      .bio {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="panel">

    <!-- BIO -->
    <div class="bio">
      Leigh Annand (b.1999 Portland, OR) work includes 
      <a href="design.html">art direction + design</a>, 
      <a href="casting.html">casting</a>, and 
      <a href="projects.html">more</a>. 
      To get in touch, or inquire further about work please send an email to 
      <a href="mailto:annand.leigh@gmail.com">annand.leigh@gmail.com</a>. 
      PDF portfolio and CV available upon request.
    </div>

    <!-- INDEX -->
    <div class="bottom">
      <a href="index.html">Index</a>
    </div>

  </div>
</body>
</html>
