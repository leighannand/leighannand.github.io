<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leigh Annand</title>

  <style>
    body {
      margin: 0;
      padding: 1.2vw 0 0 1.2vw;
      background: #ffffff;
      font-family: "Times New Roman", Times, serif;
      color: #111;
    }

    /* BIO */
    .bio {
      font-size: clamp(16px, 2.2vw, 28px);
      line-height: 1.2;
      letter-spacing: -0.2px;
      max-width: 100vw;
    }

    .bio a {
      color: #111;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      cursor: pointer;
    }

    .bio a:hover {
      opacity: 0.6;
    }

    /* IMAGE (hidden by default) */
    .gallery {
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      margin-top: 100px;
      width: 100%;
    }

    .gallery.show {
      display: flex;
    }

    .gallery-item {
      text-align: center;
    }

    .gallery-item img {
      width: 260px;
      max-width: 70vw;
      height: auto;
    }

    .caption {
      font-size: 12px;
      margin-top: 8px;
      color: #666;
    }

    /* INDEX (bottom-left) */
    .bottom {
      position: fixed;
      bottom: 1.2vw;
      left: 1.2vw;
      font-size: clamp(14px, 1.2vw, 20px);
    }

    .bottom a {
      text-decoration: none;
      color: #111;
    }

    @media (min-width: 1600px) {
      .bio {
        max-width: 1400px;
      }
    }

    /* MOBILE */
    @media (max-width: 768px) {
      body {
        padding: 10px 0 0 10px;
      }

      .bio {
        font-size: 18px;
        line-height: 1.3;
        letter-spacing: 0;
        max-width: 95%;
      }

      .bottom {
        font-size: 16px;
        bottom: 10px;
        left: 10px;
      }

      .gallery {
        margin-top: 60px;
      }

      .gallery-item img {
        width: 200px;
      }
    }
  </style>
</head>

<body>

  <!-- BIO -->
  <div class="bio">
    Leigh Annand (b.1999 Portland, OR) work includes 
    <a href="#" id="art-link">art direction + design</a>, 
    <a href="casting.html">casting</a>, and 
    <a href="projects.html">more</a>. 
    To get in touch, or inquire further about work please send an email to 
    <a href="mailto:annand.leigh@gmail.com">annand.leigh@gmail.com</a>. 
    PDF portfolio and CV available upon request.
  </div>

  <!-- IMAGE -->
  <section class="gallery" id="gallery">
    <div class="gallery-item">
      <img src="../images:/2024ABFIGFlyerBrown.png" alt="ABFIG Flyer">
      <div class="caption">ABFIG Flyer, 2024</div>
    </div>
  </section>

  <!-- SCRIPT -->
  <script>
    const artLink = document.getElementById("art-link");
    const gallery = document.getElementById("gallery");

    artLink.addEventListener("click", function(e) {
      e.preventDefault();
      gallery.classList.toggle("show");
    });
  </script>

</body>
</html>
