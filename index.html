<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leigh Annand</title>

  <style>
    body {
      margin: 0;
      padding: 1.2vw 0 0 1.2vw;
      background: #ffffff;
      font-family: "Times New Roman", Times, serif;
      color: #111;
    }

    /* BIO */
    .bio {
      font-size: clamp(16px, 2.2vw, 28px);
      line-height: 1.2;
      letter-spacing: -0.2px;
      max-width: 100vw;
    }

    .bio a {
      color: #111;
      text-decoration: underline;
      text-decoration-thickness: 1px;
    }

    .bio a:hover {
      opacity: 0.6;
    }

    /* IMAGE REVEAL */
    #art-container {
      display: none;
      margin-top: 20px;
      max-width: 420px;
    }

    #art-image {
      width: 100%;
      cursor: pointer;
    }

    #art-caption {
      font-size: 12px;
      margin-top: 6px;
    }

    /* INDEX (bottom-left) */
    .bottom {
      position: fixed;
      bottom: 1.2vw;
      left: 1.2vw;
      font-size: clamp(14px, 1.2vw, 20px);
    }

    .bottom a {
      text-decoration: none;
      color: #111;
    }

    @media (min-width: 1600px) {
      .bio {
        max-width: 1400px;
      }
    }

    /* MOBILE */
    @media (max-width: 768px) {
      body {
        padding: 10px 0 0 10px;
      }

      .bio {
        font-size: 18px;
        line-height: 1.3;
        letter-spacing: 0;
        max-width: 95%;
      }

      .bottom {
        font-size: 16px;
        bottom: 10px;
        left: 10px;
      }
    }

    @media (max-width: 420px) {
      .bio {
        font-size: 16px;
      }
    }

  </style>
</head>

<body>

  <!-- BIO -->
  <div class="bio">
    Leigh Annand (b.1999 Portland, OR) work includes 
    <a href="#" id="art-link">art direction + design</a>, 
    <a href="casting.html">casting</a>, and 
    <a href="projects.html">more</a>. 
    To get in touch, or inquire further about work please send an email to 
    <a href="mailto:annand.leigh@gmail.com">annand.leigh@gmail.com</a>. 
    PDF portfolio and CV available upon request.
  </div>

  <!-- IMAGE REVEAL -->
  <div id="art-container">
    <img id="art-image" src="./images:/2024ABFIGFlyerBrown.png" alt="Work">
    <p id="art-caption">Alphabet Tee, 2025</p>
  </div>

  <!-- INDEX -->
  <div class="bottom">
    <a href="work.html">Index</a>
  </div>

  <!-- SCRIPT -->
  <script>
    const artLink = document.getElementById("art-link");
    const container = document.getElementById("art-container");
    const image = document.getElementById("art-image");
    const caption = document.getElementById("art-caption");

    const works = [
      {
        src: "images:/2024ABFIGFlyerBrown.png",
        caption: "Alphabet Tee: Photo, Art Direction, Design"},
      {
        src: "image2.jpg",
        caption: "Lookbook Study, 2024"
      },
      {
        src: "image3.jpg",
        caption: "Casting Direction, 2023"
      }
    ];

    let currentIndex = 0;

    // click text → reveal first image
    artLink.addEventListener("click", (e) => {
      e.preventDefault();
      container.style.display = "block";
      currentIndex = 0;
      updateImage();
    });

    // click image → next image
    image.addEventListener("click", () => {
      currentIndex++;

      if (currentIndex >= works.length) {
        currentIndex = 0; // loops
      }

      updateImage();
    });

    function updateImage() {
      image.src = works[currentIndex].src;
      caption.textContent = works[currentIndex].caption;
    }
  </script>

</body>
</html>
